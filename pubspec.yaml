name: timer
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  async: ^2.11.0
  auto_route: ^10.0.1
  badges: ^3.1.2
  collection: ^1.19.0
  connectivity_plus: ^7.0.0
  country_picker: ^2.0.27
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.2
  flutter_dotenv: ^6.0.0
  flutter_easyloading: ^3.0.5
  flutter_local_notifications: ^20.1.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_svg: ^2.0.17
  focus_detector: ^2.0.1
  get: ^4.7.2
  http: ^1.3.0 
  intl: ^0.20.2
  lottie: ^3.3.1
  nested_scroll_view_plus: ^3.0.1
  pull_to_refresh: ^2.0.0
  shared_preferences: ^2.5.3
  shimmer: ^3.0.0
  sliver_tools: ^0.2.12
  top_snackbar_flutter: ^3.2.0
  tutorial_coach_mark: ^1.3.1
  uuid: ^4.4.2
  webview_flutter: ^4.4.2
  webview_flutter_android: ^4.10.1
  webview_flutter_wkwebview: ^3.9.4

dev_dependencies:
  auto_route_generator: ^10.0.1
  build_runner: ^2.1.2
  build_web_compilers: ^4.0.4
  flutter_launcher_icons: ^0.14.2

  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

# flutter_icons:
#   android: "launcher_icon"
#   ios: true
#   image_path: "assets/images/icon.png"
#   adaptive_icon_background: "#FFFFFF"
#   remove_alpha_ios: true
flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/lottie/
    - assets/fonts/
    - assets/.env

  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/fonts/satoshi/Satoshi-Light.otf
          weight: 300
        - asset: assets/fonts/satoshi/Satoshi-Regular.otf
        - asset: assets/fonts/satoshi/Satoshi-Medium.otf
          weight: 500
        - asset: assets/fonts/satoshi/Satoshi-Bold.otf
          weight: 700

    - family: SpaceGrotesk
      fonts:
        - asset: assets/fonts/spacegrotesk/SpaceGrotesk-Light.ttf
          weight: 300
        - asset: assets/fonts/spacegrotesk/SpaceGrotesk-Regular.ttf
          weight: 400
        - asset: assets/fonts/spacegrotesk/SpaceGrotesk-Medium.ttf
          weight: 500
        - asset: assets/fonts/spacegrotesk/SpaceGrotesk-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/spacegrotesk/SpaceGrotesk-Bold.ttf
          weight: 700
